services:
  # Web Service - Spring Boot API
  - name: instaloc-api
    type: web
    envVars:
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: DB_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: DB_URL
        fromDatabase:
          name: instloc-db
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: instloc-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: instloc-db
          property: password
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: SUPABASE_URL
        value: https://ltsklagfqeqphqttrahy.supabase.co
      - key: SUPABASE_JWT_SECRET
        sync: false
    dockerfilePath: Dockerfile
    dockerCommand: sh -c "java -Xmx512m -Xms256m -jar app.jar"

databases:
  # PostgreSQL Database with PostGIS
  - name: instloc-db
    plan: free
    postgresMajorVersion: "16"
