version: '3.8'\n\nservices:\n  app:\n    build:\n      context: .\n      dockerfile: Dockerfile\n    container_name: instaloc-app\n    ports:\n      - "8080:8080"\n    environment:\n      - JAVA_OPTS=-Xmx256m -Xms128m\n      - TMP_DIR=/tmp/instaloc\n    mem_limit: 768m\n    mem_reservation: 512m\n    volumes:\n      - ./uploads:/tmp/instaloc\n      - /tmp/instaloc:/tmp/instaloc\n    restart: unless-stopped\n    healthcheck:\n      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]\n      interval: 30s\n      timeout: 3s\n      retries: 3\n      start_period: 40s